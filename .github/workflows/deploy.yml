name: Deploy Book

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 20 是当前 Actions 上能稳定用、且 VuePress 1.9.9 + sass-loader 13 兼容的最后一个 LTS。
      # Node 16 已被 GitHub Actions runners 移除（2025 年起）。
      # Node 24 默认是 runner 的 Node，但 sass-loader 13 在 Node 24 下大概率挂。
      - name: Allow Node 20
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        run: echo "ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=$ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 用 npm install 而不是 npm ci —— 兼容"没有 lock 文件"的情况。
      # 推荐：本地跑一次 `npm install`，把生成的 package-lock.json 一并提交，可提速并保证可复现。
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4