name: Deploy Book

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # VuePress 1.9.9 内部的 vue-server-renderer@4.5.0 依赖 webpack 4 + tapable 1.x
      # Node 18+ 装出来的 tapable 是 2.x，hook API 变了会触发：
      #   "TypeError: Cannot read properties of undefined (reading 'tapAsync')"
      # Node 16 是 VP1 官方测试过的环境，setup-node v4 加 ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=true 仍可装。
      - name: Allow Node 16
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        run: echo "ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION=$ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 16

      # 用 npm install 而不是 npm ci（兼容无 lock）。本地有 lock 时也走得很快。
      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4